services:
  postgres:
    image: postgres:16-alpine
    container_name: blast-radius-db
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: blast_radius
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d blast_radius"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
